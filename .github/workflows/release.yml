name: Release

# Release workflow for @harborclient/sdk. Runs when changes land on `main`.
# Bumps the `version` field in package.json (patch semver), renames
# `## Unreleased` in CHANGELOG.md to the new version, commits + tags +
# pushes back to `main`, and publishes to npm. Skips when `## Unreleased`
# has no content (release commits use `[skip ci]` and do not re-trigger).
#
# Required setup BEFORE the first run:
#
#   1. Repository secret `NPM_TOKEN`: an npm automation token (or a granular
#      token configured to bypass 2FA prompts) with publish rights to
#      @harborclient/sdk.
#
#   2. Branch protection on `main` must allow github-actions[bot] to push.

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  changelog:
    needs: ci
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for Unreleased changelog content
        id: check
        run: |
          set -euo pipefail
          if python3 - <<'PY'
          import re
          import pathlib
          import sys

          path = pathlib.Path("CHANGELOG.md")
          if not path.exists():
              sys.exit(1)
          text = path.read_text()
          match = re.search(r"^## Unreleased\s*\n(.*?)(?=^## |\Z)", text, flags=re.S | re.M)
          if not match or not match.group(1).strip():
              sys.exit(1)
          PY
          then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "No Unreleased changelog content; skipping release."
          fi

  release:
    needs: [ci, changelog]
    if: needs.changelog.outputs.ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Bump version
        run: |
          set -euo pipefail
          VERSION=$(pnpm version patch --no-git-tag-version | tail -n1 | sed 's/^v//')
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Bumped to $VERSION"

      - name: Update CHANGELOG.md for release
        if: env.VERSION != ''
        run: |
          set -euo pipefail
          python3 - "$VERSION" "$(date -u +%Y-%m-%d)" <<'PY'
          import re
          import sys
          import pathlib

          version, date_iso = sys.argv[1], sys.argv[2]
          path = pathlib.Path("CHANGELOG.md")
          if not path.exists():
              print("::warning::CHANGELOG.md not found; skipping changelog rename.")
              sys.exit(0)

          text = path.read_text()
          match = re.search(r"^## Unreleased\s*\n(.*?)(?=^## |\Z)", text, flags=re.S | re.M)
          if not match or not match.group(1).strip():
              print("::warning::No Unreleased content; skipping changelog rename.")
              sys.exit(0)

          body = match.group(1).strip("\n")
          replacement = f"## Unreleased\n\n## {version} - {date_iso}\n\n{body}\n"
          new_text = re.sub(
              r"^## Unreleased\s*\n.*?(?=^## |\Z)",
              replacement + "\n",
              text,
              count=1,
              flags=re.S | re.M,
          )
          path.write_text(new_text)
          PY

      - name: Commit, tag, and push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json CHANGELOG.md
          git commit -m "chore(changelog): release v${VERSION} [skip ci]"
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin HEAD:main --follow-tags

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm publish --access public --no-git-checks

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "v${VERSION}" --generate-notes --title "v${VERSION}"
